events {}

http {
  upstream openobserve_upstream {
    server openobserve.dylanp.nl:443;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass https://openobserve_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host openobserve.dylanp.nl;
      proxy_set_header Connection "";
      proxy_ssl_server_name on;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}
