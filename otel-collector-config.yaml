receivers:
  otlp:
    protocols:
      grpc:
      http:

  filelog:
    include:
      - /var/telemetry-logs/*.log
    start_at: end
    include_file_path: true
    operators:
      - type: json_parser
        parse_from: body
        parse_to: attributes
        timestamp:
          parse_from: attributes.timestamp
          layout: "%Y-%m-%dT%H:%M:%S.%fZ"
        severity:
          parse_from: attributes.severity

  prometheus/cadvisor:
    config:
      scrape_configs:
        - job_name: cadvisor
          scrape_interval: 15s
          static_configs:
            - targets:
                - cadvisor:8080

  prometheus/otelcol:
    config:
      scrape_configs:
        - job_name: otelcol
          scrape_interval: 5s
          static_configs:
            - targets:
                - otel-collector:8888

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  probabilistic_sampler/traces:
    sampling_percentage: 100

  filter/logs:
    error_mode: ignore
    logs:
      log_record: []

  transform/logs:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          # Vul service op basis van mogelijke bestaande velden.
          - set(attributes["service"], attributes["service.name"]) where attributes["service"] == nil and attributes["service.name"] != nil
          - set(attributes["service"], attributes["service_name"]) where attributes["service"] == nil and attributes["service_name"] != nil
          - set(attributes["service"], resource.attributes["service.name"]) where attributes["service"] == nil and resource.attributes["service.name"] != nil
          - set(attributes["service"], resource.attributes["service_name"]) where attributes["service"] == nil and resource.attributes["service_name"] != nil

          # Vul service_name op basis van mogelijke bestaande velden.
          - set(attributes["service_name"], attributes["service.name"]) where attributes["service_name"] == nil and attributes["service.name"] != nil
          - set(attributes["service_name"], attributes["service"]) where attributes["service_name"] == nil and attributes["service"] != nil
          - set(attributes["service_name"], resource.attributes["service.name"]) where attributes["service_name"] == nil and resource.attributes["service.name"] != nil
          - set(attributes["service_name"], resource.attributes["service"]) where attributes["service_name"] == nil and resource.attributes["service"] != nil

  transform/traces:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          # Zorg dat traces zowel service als service_name als resource attributes hebben.
          - set(attributes["service"], attributes["service.name"]) where attributes["service"] == nil and attributes["service.name"] != nil
          - set(attributes["service_name"], attributes["service.name"]) where attributes["service_name"] == nil and attributes["service.name"] != nil
          - set(attributes["service_name"], attributes["service"]) where attributes["service_name"] == nil and attributes["service"] != nil

  filter/metrics:
    error_mode: ignore
    metrics:
      metric: []

  batch/traces:
    send_batch_size: 1024
    timeout: 2s

  batch/metrics:
    send_batch_size: 1024
    timeout: 5s

  batch/logs:
    send_batch_size: 1024
    timeout: 2s

  resource/common:
    attributes:
      - key: deployment.environment
        value: poc
        action: upsert
      - key: service.namespace
        value: openobserve-poc
        action: upsert

exporters:
  otlphttp/openobserve_traces:
    endpoint: http://o2-relay/api/3BTUvLGWaJI6cc5tC2JGlZTW1ea
    headers:
      Authorization: Basic a2xhbnRAa2xhbnQubmw6WVJ6YmlJSXVuMndIeUJYWQ==
      stream-name: poc_traces_v2
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 0s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 20000
      storage: file_storage

  otlphttp/openobserve_metrics:
    endpoint: http://o2-relay/api/3BTUvLGWaJI6cc5tC2JGlZTW1ea
    headers:
      Authorization: Basic a2xhbnRAa2xhbnQubmw6WVJ6YmlJSXVuMndIeUJYWQ==
      stream-name: poc_metrics_v2
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 0s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 20000
      storage: file_storage

  otlphttp/openobserve_logs:
    endpoint: http://o2-relay/api/3BTUvLGWaJI6cc5tC2JGlZTW1ea
    headers:
      Authorization: Basic a2xhbnRAa2xhbnQubmw6WVJ6YmlJSXVuMndIeUJYWQ==
      stream-name: poc_logs_v2
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 0s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 20000
      storage: file_storage

extensions:
  health_check:

  file_storage:
    directory: /var/lib/otelcol/file_storage

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info

  extensions:
    - health_check
    - file_storage

  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - probabilistic_sampler/traces
        - resource/common
        - transform/traces
        - batch/traces
      exporters:
        - otlphttp/openobserve_traces

    metrics:
      receivers:
        - otlp
        - prometheus/cadvisor
        - prometheus/otelcol
      processors:
        - memory_limiter
        - filter/metrics
        - resource/common
        - batch/metrics
      exporters:
        - otlphttp/openobserve_metrics

    logs:
      receivers:
        - otlp
        - filelog
      processors:
        - memory_limiter
        - filter/logs
        - resource/common
        - transform/logs
        - batch/logs
      exporters:
        - otlphttp/openobserve_logs
