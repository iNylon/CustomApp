services:
  php-storefront:
    build:
      context: ./php-app
    container_name: php-storefront
    ports:
      - "8080:8080"
    environment:
      APP_ENV: poc
      CUSTOMAPP_MEASUREMENT_RUN: ${CUSTOMAPP_MEASUREMENT_RUN:-apm-on}
      CUSTOMAPP_APM_ENABLED: ${CUSTOMAPP_APM_ENABLED:-true}
      CUSTOMAPP_APM_PROFILE: ${CUSTOMAPP_APM_PROFILE:-with-apm}
      APP_SERVICE_NAME: php-storefront
      APP_PORT: "8080"
      APP_LOG_FILE: /var/telemetry-logs/php-storefront.log
      APP_ENABLE_RUM: ${CUSTOMAPP_APM_ENABLED:-true}
      APP_RUM_CLIENT_TOKEN: rumsc8iFvkD9574Idx7
      APP_RUM_APPLICATION_ID: web-application-id
      APP_RUM_SITE: openobserve.dylanp.nl
      APP_RUM_ORGANIZATION_IDENTIFIER: 3BTUvLGWaJI6cc5tC2JGlZTW1ea
      APP_RUM_SERVICE: php-storefront-web
      APP_RUM_ENV: poc
      APP_RUM_VERSION: 0.0.1
      APP_RUM_API_VERSION: v1
      APP_RUM_INSECURE_HTTP: "false"
      MYSQL_DSN: mysql:host=mysql;port=3306;dbname=catalog
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      POSTGRES_DSN: pgsql:host=postgres;port=5432;dbname=recommendations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_SERVICE_URL: http://node-catalog:3000
      PYTHON_SERVICE_URL: http://python-recommendation:8000
      JAVA_SERVICE_URL: http://java-checkout:8081
      OTEL_EXPORTER_OTLP_HTTP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: service.name=php-storefront,service.namespace=openobserve-poc,deployment.environment=poc,customapp_measurement_run=${CUSTOMAPP_MEASUREMENT_RUN:-apm-on},customapp_apm_enabled=${CUSTOMAPP_APM_ENABLED:-true},customapp_apm_profile=${CUSTOMAPP_APM_PROFILE:-with-apm}
      APP_DB_BOTTLENECK_MODE: "true"
      APP_DB_BOTTLENECK_LOOPS: "12"
      APP_REDIS_BOTTLENECK_LOOPS: "30"
      APP_RESOURCE_WARN_CPU_PERCENT: "35"
      APP_RESOURCE_WARN_MEMORY_MB: "180"
    depends_on:
      - mysql
      - postgres
      - redis
      - node-catalog
      - python-recommendation
      - java-checkout
      - otel-collector
    volumes:
      - telemetry-logs:/var/telemetry-logs

  python-recommendation:
    build:
      context: ./python-service
    container_name: python-recommendation
    environment:
      CUSTOMAPP_MEASUREMENT_RUN: ${CUSTOMAPP_MEASUREMENT_RUN:-apm-on}
      CUSTOMAPP_APM_ENABLED: ${CUSTOMAPP_APM_ENABLED:-true}
      CUSTOMAPP_APM_PROFILE: ${CUSTOMAPP_APM_PROFILE:-with-apm}
      APP_SERVICE_NAME: python-recommendation
      APP_PORT: "8000"
      APP_LOG_FILE: /var/telemetry-logs/python-recommendation.log
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: recommendations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: python-recommendation
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=openobserve-poc,deployment.environment=poc
      APP_DB_BOTTLENECK_MODE: "true"
      APP_DB_BOTTLENECK_LOOPS: "14"
      APP_SYNTHETIC_FAILURE_RATE_PERCENT: "28"
      APP_METRIC_KEEPALIVE_ENABLED: "true"
      APP_METRIC_KEEPALIVE_INTERVAL_SECONDS: "12"
      APP_METRIC_KEEPALIVE_START_DELAY_SECONDS: "8"
      APP_METRIC_KEEPALIVE_ROUNDS_PER_CYCLE: "2"
      APP_METRIC_KEEPALIVE_BETWEEN_REQUESTS_MS: "120"
      APP_RESOURCE_SAMPLE_INTERVAL_SECONDS: "10"
      APP_RESOURCE_WARN_CPU_PERCENT: "35"
      APP_RESOURCE_WARN_MEMORY_MB: "180"
      PHP_STOREFRONT_URL: http://php-storefront:8080
      NODE_SERVICE_URL: http://node-catalog:3000
      JAVA_SERVICE_URL: http://java-checkout:8081
    depends_on:
      - postgres
      - redis
      - otel-collector
    volumes:
      - telemetry-logs:/var/telemetry-logs

  node-catalog:
    build:
      context: ./node-service
    container_name: node-catalog
    environment:
      CUSTOMAPP_MEASUREMENT_RUN: ${CUSTOMAPP_MEASUREMENT_RUN:-apm-on}
      CUSTOMAPP_APM_ENABLED: ${CUSTOMAPP_APM_ENABLED:-true}
      CUSTOMAPP_APM_PROFILE: ${CUSTOMAPP_APM_PROFILE:-with-apm}
      APP_SERVICE_NAME: node-catalog
      APP_PORT: "3000"
      APP_LOG_FILE: /var/telemetry-logs/node-catalog.log
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: catalog
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: node-catalog
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=openobserve-poc,deployment.environment=poc
      APP_DB_BOTTLENECK_MODE: "true"
      APP_DB_BOTTLENECK_LOOPS: "16"
      APP_SYNTHETIC_FAILURE_RATE_PERCENT: "24"
      APP_SLOW_LOG_THRESHOLD_MS: "100"
      APP_RESOURCE_SAMPLE_INTERVAL_MS: "10000"
      APP_RESOURCE_WARN_CPU_PERCENT: "35"
      APP_RESOURCE_WARN_MEMORY_MB: "180"
    depends_on:
      - mysql
      - redis
      - otel-collector
    volumes:
      - telemetry-logs:/var/telemetry-logs

  java-checkout:
    build:
      context: ./java-service
    container_name: java-checkout
    environment:
      CUSTOMAPP_MEASUREMENT_RUN: ${CUSTOMAPP_MEASUREMENT_RUN:-apm-on}
      CUSTOMAPP_APM_ENABLED: ${CUSTOMAPP_APM_ENABLED:-true}
      CUSTOMAPP_APM_PROFILE: ${CUSTOMAPP_APM_PROFILE:-with-apm}
      APP_SERVICE_NAME: java-checkout
      APP_PORT: "8081"
      APP_LOG_FILE: /var/telemetry-logs/java-checkout.log
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APP_SYNTHETIC_FAILURE_RATE_PERCENT: "24"
      APP_SLOW_LOG_THRESHOLD_MS: "100"
      APP_RESOURCE_SAMPLE_INTERVAL_MS: "10000"
      APP_RESOURCE_WARN_CPU_PERCENT: "35"
      APP_RESOURCE_WARN_MEMORY_MB: "180"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: java-checkout
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=openobserve-poc,deployment.environment=poc
    depends_on:
      - redis
      - otel-collector
    volumes:
      - telemetry-logs:/var/telemetry-logs

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: poc-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  mysql:
    image: mysql:8.4
    container_name: poc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalog
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  postgres:
    image: postgres:16
    container_name: poc-postgres
    environment:
      POSTGRES_DB: recommendations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: poc-redis
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: poc-otel-collector
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - telemetry-logs:/var/telemetry-logs:ro
      - otelcol-file-storage:/var/lib/otelcol/file_storage
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
    depends_on:
      - mysql
      - postgres
      - redis
      - cadvisor
      - o2-relay

  o2-relay:
    image: nginx:1.27-alpine
    container_name: poc-o2-relay
    volumes:
      - ./o2-relay/nginx.conf:/etc/nginx/nginx.conf:ro

  load-generator:
    build:
      context: ./loadgen
    container_name: poc-load-generator
    environment:
      TARGET_HOST: http://php-storefront:8080
    ports:
      - "8089:8089"
    command:
      - locust
      - -f
      - /app/locustfile.py
      - --host
      - http://php-storefront:8080
      - --web-host
      - 0.0.0.0
    depends_on:
      - php-storefront

  rum-browser-runner:
    build:
      context: ./browser-loadgen
    container_name: poc-rum-browser-runner
    environment:
      TARGET_URL: http://php-storefront:8080
      LOCUST_UI_URL: http://load-generator:8089
      CUSTOMAPP_MEASUREMENT_RUN: ${CUSTOMAPP_MEASUREMENT_RUN:-apm-on}
      CUSTOMAPP_APM_ENABLED: ${CUSTOMAPP_APM_ENABLED:-true}
      CUSTOMAPP_APM_PROFILE: ${CUSTOMAPP_APM_PROFILE:-with-apm}
      BROWSER_CONCURRENCY: "3"
      BROWSER_USERS_PER_WORKER: "25"
      LOCUST_POLL_INTERVAL_MS: "5000"
      SESSION_INTERVAL_MS: "4000"
      SESSION_DURATION_MS: "3000"
      RUM_ERROR_EVERY_N: "1"
      RUM_ERROR_DELAY_MS: "8000"
      FAULT_EVERY_N: "2"
      RUM_LOGIN_EMAIL: dylan@dylan123.nl
      RUM_LOGIN_PASSWORD: dylan123
    depends_on:
      - php-storefront
      - load-generator

volumes:
  mysql-data:
  postgres-data:
  telemetry-logs:
  otelcol-file-storage:
